<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a18; color: #c8a84b; font-family: 'Share Tech Mono', 'Courier New', monospace; min-height: 100vh; padding: 2.5rem 1.5rem; }
  #wrap { max-width: 680px; margin: 0 auto; }
  header { border-bottom: 1px solid #3a3830; padding-bottom: 1.25rem; margin-bottom: 2rem; }
  .logo { font-family: 'Special Elite', serif; font-size: 22px; color: #e0b84a; letter-spacing: 0.08em; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #6b5e2e; letter-spacing: 0.2em; text-transform: uppercase; }
  .controls { display: flex; gap: 10px; margin-bottom: 1.75rem; flex-wrap: wrap; }
  button { font-family: 'Share Tech Mono', monospace; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 18px; background: transparent; border: 1px solid #5a4e24; color: #c8a84b; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
  button:hover { background: #2a2820; border-color: #c8a84b; color: #e0b84a; }
  button:active { opacity: 0.7; }
  #copy-btn { display: none; }
  #copy-btn.copied { color: #7ab87a; border-color: #4a7a4a; }
  .week { display: flex; flex-direction: column; gap: 10px; }
  .day-card { border: 1px solid #2e2c24; background: #1e1e1b; padding: 14px 16px; }
  .day-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; border-bottom: 1px solid #2e2c24; padding-bottom: 8px; }
  .day-name { font-family: 'Special Elite', serif; font-size: 15px; color: #e0b84a; letter-spacing: 0.08em; }
  .day-medals { font-size: 11px; color: #6b5e2e; letter-spacing: 0.1em; }
  .ops { display: flex; flex-direction: column; gap: 6px; }
  .op-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .op-name { font-size: 13px; color: #c8a84b; white-space: nowrap; }
  .op-sep { color: #4a4230; margin: 0 4px; }
  .op-condition { font-size: 12px; color: #7a6a38; flex: 1; }
  .op-m { font-size: 11px; color: #5a4e24; white-space: nowrap; }
  .empty { font-size: 13px; color: #3a3220; text-align: center; padding: 3rem 0; letter-spacing: 0.15em; text-transform: uppercase; }
  footer { margin-top: 2rem; font-size: 10px; color: #3a3220; letter-spacing: 0.15em; text-align: center; text-transform: uppercase; }
</style>

<script>
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const POOL = [
  { name:"Corpse Disposal", cond:"take out the trash in under 3 min, no phone", m:1 },
  { name:"Purify the Relics", cond:"wash all dishes in one continuous session, spy/heist OST only", m:1 },
  { name:"Inventory Management", cond:"fold and sort entire wardrobe like a loot chest", m:1 },
  { name:"Patrol Route", cond:"run any distance with ULTRAKILL or DOOM OST", m:2 },
  { name:"Sweep the Catacombs", cond:"vacuum or sweep every room, no skipping corners", m:1 },
  { name:"Sanitize the Compound", cond:"wipe down kitchen and bathroom surfaces fully", m:1 },
  { name:"Resupply Run", cond:"complete groceries or errands in a single trip", m:1 },
  { name:"The Debrief", cond:"review and log your day in Notion in 5 min", m:1 },
  { name:"Tactical Nutrition", cond:"cook a real meal from scratch, no instant food", m:2 },
  { name:"Field Maintenance", cond:"shower and complete full hygiene routine properly", m:1 },
  { name:"Comms Blackout", cond:"stay off your phone for 30 min while doing something physical", m:1 },
  { name:"Perimeter Check", cond:"clear and tidy your desk — surface clean, cables managed", m:1 },
  { name:"Gear Inspection", cond:"run a full laundry cycle and put it all away", m:1 },
  { name:"Neutralize the Biohazard", cond:"clean the toilet, sink, and mirror — all three", m:2 },
  { name:"Restock the Armory", cond:"return every misplaced item to its correct location", m:1 },
  { name:"The Long March", cond:"walk to a destination instead of taking transit", m:1 },
  { name:"Stretch Protocol", cond:"stretch or do mobility work for 10 min, go slow", m:1 },
  { name:"Hydration Mandate", cond:"drink 2L of water before 8pm, track it", m:1 },
  { name:"Dead Drop", cond:"deliver or return something that needs to go somewhere", m:1 },
  { name:"Radio Silence Workout", cond:"complete any workout with no music — just focus", m:2 },
  { name:"Intel Gathering", cond:"read something non-school for 20 min — book or longform only", m:1 },
  { name:"Exfiltration Prep", cond:"pack your bag for tomorrow the night before", m:1 },
  { name:"The Extraction", cond:"leave the house before noon, destination doesn't matter", m:1 },
];

let currentWeek = [];

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickDay(pool, target) {
  let used = [], total = 0;
  let shuffled = shuffle(pool);
  for (let op of shuffled) {
    if (total + op.m <= target + 1 && used.length < 5) {
      used.push(op); total += op.m;
      if (total >= target) break;
    }
  }
  return used;
}

function playJingle() {
  const audio = document.getElementById('jingle');
  audio.pause();
  audio.currentTime = 0;
  audio.volume = 1;
  audio.play();
  const duration = audio.duration || 1.77;
  const fadeStart = Math.max(0, duration - 0.6);
  let fadeTimer = null;
  audio.ontimeupdate = function() {
    if (audio.currentTime >= fadeStart) {
      if (!fadeTimer) {
        fadeTimer = setInterval(() => {
          audio.volume = Math.max(0, audio.volume - 0.05);
          if (audio.volume <= 0) { clearInterval(fadeTimer); audio.pause(); }
        }, 30);
      }
    }
  };
}

function generate() {
  playJingle();
  currentWeek = [];
  let used = new Set();
  for (let d = 0; d < 7; d++) {
    let available = POOL.filter(o => !used.has(o.name));
    if (available.length < 2) { available = shuffle(POOL); used = new Set(); }
    let day = pickDay(available, 4);
    day.forEach(o => used.add(o.name));
    currentWeek.push({ day: DAYS[d], ops: day, total: day.reduce((s,o) => s+o.m, 0) });
  }
  render();
  const cb = document.getElementById('copy-btn');
  cb.style.display = 'inline-block';
  cb.textContent = '[ Copy for Notion ]';
  cb.classList.remove('copied');
}

function render() {
  document.getElementById('week').innerHTML = currentWeek.map(d => `
    <div class="day-card">
      <div class="day-header">
        <span class="day-name">${d.day}</span>
        <span class="day-medals">+${d.total} medals</span>
      </div>
      <div class="ops">
        ${d.ops.map(o => `
          <div class="op-row">
            <div style="flex:1;display:flex;align-items:baseline;flex-wrap:wrap;">
              <span class="op-name">${o.name}</span>
              <span class="op-sep">—</span>
              <span class="op-condition">${o.cond}</span>
            </div>
            <span class="op-m">+${o.m}🏅</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function copyOps() {
  const lines = currentWeek.map(d =>
    `${d.day} (+${d.total} medals)\n` +
    d.ops.map(o => `- [ ] ${o.name}: ${o.cond} [+${o.m}🏅]`).join('\n')
  ).join('\n\n');
  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '[ Copied ]';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '[ Copy for Notion ]'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
